# Custom CodeQL pack declaring Evidentia-specific sanitizers
# (v0.7.7 CF3).
#
# The pack uses CodeQL's data-extension mechanism to declare
# `evidentia_core.security.paths.validate_within` as a sanitizer
# for the `py/path-injection` query without writing custom QL.
# Data extensions are declarative YAML that the CodeQL engine
# consumes at analysis time; they're more maintainable than
# writing custom .ql files.
#
# References:
# - https://docs.github.com/en/code-security/code-scanning/managing-your-code-scanning-configuration/managing-codeql-with-data-extensions
# - https://github.com/github/codeql/blob/main/python/ql/lib/semmle/python/security/dataflow/PathInjectionCustomizations.qll

name: allenfbyrd/evidentia-python-sanitizers
version: 0.0.1
library: true

# Extend the standard codeql/python-all pack with Evidentia-
# specific sanitizer models. All YAML files under models/ are
# loaded as data extensions.
extensionTargets:
  codeql/python-all: '*'

dataExtensions:
  - models/**/*.yml
