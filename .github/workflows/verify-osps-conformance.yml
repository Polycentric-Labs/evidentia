# Re-validates every claimed-PASS evidence link in OSPS-CONFORMANCE.md
# on every push to main, every PR, and weekly to catch link rot.
#
# If any evidence link returns HTTP 404 from `gh api`, this workflow
# fails — OSPS-CONFORMANCE.md must be updated (fix the link, restore
# the missing file, or downgrade the verdict to HONEST_GAP) before
# the next release.
#
# Threat model: see docs/threat-model.md §"v0.10.6 attack-surface
# delta" → "Guards: verify-osps-conformance.yml workflow" for the
# token-scope + rate-limit-DoS + workflow-injection + CodeQL-coverage
# analysis.
#
# Action pinning: every `uses:` line is pinned to a full commit SHA
# (not a tag) to pre-empt the OpenSSF Scorecard PinnedDependencies
# regression that the C7 hardening phase explicitly cleans up across
# all workflows. Comments after each SHA carry the resolved tag for
# human review.

name: verify-osps-conformance

on:
  push:
    branches: [main]
    paths:
      - "OSPS-CONFORMANCE.md"
      - "scripts/validate_osps_conformance_yaml.py"
      - ".github/workflows/verify-osps-conformance.yml"
      - ".local/pre-release-review/osps-conformance.yaml"  # tracked-when-materialized
  pull_request:
    branches: [main]
    paths:
      - "OSPS-CONFORMANCE.md"
      - "scripts/validate_osps_conformance_yaml.py"
      - ".github/workflows/verify-osps-conformance.yml"
      - ".local/pre-release-review/osps-conformance.yaml"
  schedule:
    # Weekly Monday 03:00 UTC — catches link rot from out-of-band
    # repo changes (e.g., a file rename that doesn't go through PR
    # review). Offset from codeql.yml (Mon 12:00 UTC) + scorecard.yml
    # to spread CI load.
    - cron: '0 3 * * 1'
  # Allow manual re-runs from the Actions UI for diagnostic purposes.
  workflow_dispatch:

# Read-only defaults — workflow has no write surface. `gh api`
# read calls use the default GITHUB_TOKEN which is scoped to this
# repo only and is short-lived (~60 min).
permissions:
  contents: read
  actions: read

jobs:
  verify-conformance-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml==6.0.3

      - name: Parse OSPS-CONFORMANCE.md and extract evidence claims
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          md = Path("OSPS-CONFORMANCE.md").read_text(encoding="utf-8")

          # Match table rows of the form:
          #   | OSPS-XX-NN | <title> | ✅ PASS | [link-text](URL) ... |
          # The `(?:\.\d+)?` allows for assessment-requirement IDs
          # like OSPS-AC-01.01 in addition to top-level OSPS-AC-01.
          pattern = re.compile(
              r"^\|\s*(OSPS-[A-Z]{2}-\d+(?:\.\d+)?)\s*\|"
              r"[^|]+\|"  # title cell
              r"\s*✅\s*PASS\s*\|"
              r"\s*([^|]+)\|",  # evidence cell
              re.MULTILINE,
          )
          claims = pattern.findall(md)
          if not claims:
              print(
                  "::error::No PASS-claimed controls parsed from OSPS-CONFORMANCE.md. "
                  "Has the table format drifted from the regex?",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"::notice::Parsed {len(claims)} PASS-claimed controls; verifying evidence URLs...")

          # The repo coordinates (owner/repo) for translating
          # html-render URLs into API endpoints. Pinned here rather
          # than read from $GITHUB_REPOSITORY so the workflow stays
          # functional if a fork triggers it via PR — evidence URLs
          # in this doc always point at the upstream repo.
          OWNER_REPO = "Polycentric-Labs/evidentia"

          # Translate an HTML-render URL like
          #   https://github.com/OWNER/REPO/blob/main/SECURITY.md
          # into an API endpoint that returns a clean 404 on missing
          # files:
          #   repos/OWNER/REPO/contents/SECURITY.md?ref=main
          #
          # WHY: GitHub's HTML renderer can return HTTP 200 with a
          # "Page Not Found" body for paths under a public repo even
          # when the file does NOT exist on `main` HEAD (depending on
          # auth state + caching layer behavior). The contents-API
          # endpoint is the documented "does this path exist on this
          # ref" check and returns a clean 404. Same logic applies
          # to /tree/main/<dir>, /releases/tag/<tag>, and
          # /commits/main URLs — each has a corresponding API form
          # that returns true 404 on missing resources.
          #
          # URL shapes that DON'T match any translation rule fall
          # through to the original gh-api-on-html-URL behavior with
          # a workflow annotation noting the unverified shape, so the
          # gate remains best-effort for novel URL forms rather than
          # silently passing them.
          html_blob_re = re.compile(
              rf"^https?://github\.com/{re.escape(OWNER_REPO)}/blob/main/(.+)$"
          )
          html_tree_re = re.compile(
              rf"^https?://github\.com/{re.escape(OWNER_REPO)}/tree/main/(.+)$"
          )
          html_release_tag_re = re.compile(
              rf"^https?://github\.com/{re.escape(OWNER_REPO)}/releases/tag/([^/?#]+)$"
          )
          html_commits_re = re.compile(
              rf"^https?://github\.com/{re.escape(OWNER_REPO)}/commits/([^/?#]+)$"
          )
          html_repo_root_re = re.compile(
              rf"^https?://github\.com/{re.escape(OWNER_REPO)}/?$"
          )

          def translate_url(url: str) -> tuple[str, str]:
              """Return (api_endpoint, shape_label) for a doc URL.

              The api_endpoint is suitable to pass directly as a `gh
              api` positional argument (no scheme — gh api prepends
              api.github.com). The shape_label is for diagnostic
              annotations.
              """
              m = html_blob_re.match(url)
              if m:
                  path = m.group(1)
                  return (
                      f"repos/{OWNER_REPO}/contents/{path}?ref=main",
                      "blob",
                  )
              m = html_tree_re.match(url)
              if m:
                  path = m.group(1).rstrip("/")
                  return (
                      f"repos/{OWNER_REPO}/contents/{path}?ref=main",
                      "tree",
                  )
              m = html_release_tag_re.match(url)
              if m:
                  tag = m.group(1)
                  return (
                      f"repos/{OWNER_REPO}/releases/tags/{tag}",
                      "release-tag",
                  )
              m = html_commits_re.match(url)
              if m:
                  ref = m.group(1)
                  # contents/?ref=<ref> on the repo root tests the
                  # ref exists. We use the dedicated branches API
                  # for branch refs since it returns 404 cleanly on
                  # missing branches (vs. the contents API which
                  # returns the root tree, which is less specific).
                  return (
                      f"repos/{OWNER_REPO}/branches/{ref}",
                      "commits-ref",
                  )
              if html_repo_root_re.match(url):
                  return (f"repos/{OWNER_REPO}", "repo-root")
              # No translation rule matched. Fall back to the
              # original URL — gh api will route through the HTML
              # renderer, and the response status is best-effort.
              # Surface as an annotation so future URL shapes are
              # visible in CI output.
              return (url, "unmapped")

          url_pattern = re.compile(r"\[[^\]]*\]\((https?://[^\s\)]+)\)")
          failures: list[tuple[str, str]] = []
          checked = 0
          for control_id, evidence_cell in claims:
              for url in url_pattern.findall(evidence_cell):
                  checked += 1
                  api_endpoint, shape = translate_url(url)
                  if shape == "unmapped":
                      print(
                          f"::warning::Unmapped URL shape for {control_id}: "
                          f"{url}. Falling back to direct gh-api on the "
                          f"HTML URL (best-effort 404 detection).",
                          file=sys.stderr,
                      )
                  # `gh api` routes through GitHub's REST API for
                  # the translated endpoint. We look for HTTP 404
                  # explicitly (any 2xx/3xx = pass). The `-i` flag
                  # includes response headers, which we parse for
                  # the status line. We do NOT pass the URL through
                  # any shell interpolation — it goes only to
                  # `subprocess.run` as a positional argument,
                  # blocking workflow-injection from doc content.
                  result = subprocess.run(
                      [
                          "gh",
                          "api",
                          "-i",
                          "-H",
                          "Accept: application/vnd.github+json",
                          api_endpoint,
                      ],
                      capture_output=True,
                      text=True,
                      check=False,
                  )
                  # `gh api` writes the headers to stderr when the
                  # underlying call returns a non-2xx status (the
                  # body lands on stdout regardless). Check both
                  # streams for 404 to be robust to gh's stream
                  # routing across versions.
                  combined = result.stdout + "\n" + result.stderr
                  if (
                      "HTTP/2.0 404" in combined
                      or "HTTP/1.1 404" in combined
                      or "HTTP/2 404" in combined
                  ):
                      failures.append((control_id, url))
                      print(
                          f"::error::404 on evidence for {control_id} "
                          f"(shape={shape}, endpoint={api_endpoint}): {url}",
                          file=sys.stderr,
                      )

          if failures:
              print(
                  f"::error::{len(failures)} of {checked} evidence link(s) returned HTTP 404. "
                  f"Update OSPS-CONFORMANCE.md before the next release.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(
              f"::notice::Verified {len(claims)} PASS-claimed controls / "
              f"{checked} evidence URLs; all resolved."
          )
          PY

      - name: Validate machine-readable companion schema (if present)
        run: |
          if [ -f .local/pre-release-review/osps-conformance.yaml ]; then
            echo "::notice::Found .local/pre-release-review/osps-conformance.yaml; validating schema."
            python scripts/validate_osps_conformance_yaml.py \
              .local/pre-release-review/osps-conformance.yaml
          else
            echo "::warning::.local/pre-release-review/osps-conformance.yaml not present (gitignored — won't exist on fresh clones). Skipping schema check."
          fi
